<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in | Check-in Planner</title>
  <style>
    body { font-family: Segoe UI, sans-serif; background: #0f1115; color: #e7eaf0; margin: 0; }
    .wrap { max-width: 520px; margin: 7rem auto; padding: 2rem; background: #171a21; border: 1px solid #2a2f3d; border-radius: 12px; }
    h1 { margin-top: 0; }
    .muted { color: #8b93a7; }
    a.btn { display: inline-block; background: #6ea8fe; color: #0c1320; font-weight: 600; text-decoration: none; padding: 10px 14px; border-radius: 8px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>BCT Check-in Planner</h1>
    <p class="muted">Sign in with your Google Workspace account to access the planner.</p>
    <p><a class="btn" href="{% url 'social:begin' 'google-oauth2' %}?next={% url 'planner:home' %}">Sign in with Google</a></p>
  </main>
</body>
</html>
