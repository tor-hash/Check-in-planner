[tool.ruff]
line-length = 110
target-version = "py312"
extend-exclude = [
    "**/migrations/**",
    "backend/staticfiles/**",
    "backend/media/**",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (we trust our formatter for this)
    "B008",  # function call in default argument (Django pattern)
]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]
