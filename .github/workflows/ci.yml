name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DJANGO_ENVIRONMENT: staging
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DJANGO_CSRF_TRUSTED_ORIGINS: http://127.0.0.1,http://localhost
      DATABASE_URL: sqlite:///db.sqlite3
      GOOGLE_OAUTH2_KEY: ci-google-key
      GOOGLE_OAUTH2_SECRET: ci-google-secret
      GOOGLE_WORKSPACE_DOMAIN: blackcapitaltechnology.com
      DJANGO_SECURE_SSL_REDIRECT: "False"
      DJANGO_SECURE_HSTS_SECONDS: "0"
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "False"
      DJANGO_SECURE_HSTS_PRELOAD: "False"
      USE_GOOGLE_SHEET_JOURNAL: "False"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff>=0.6.0

      - name: Lint (ruff)
        run: ruff check backend

      - name: Django system check
        run: python backend/manage.py check

      - name: Migration check
        run: python backend/manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python backend/manage.py test apps.planner.tests apps.accounts.tests --verbosity=2
