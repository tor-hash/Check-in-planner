<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner Home</title>
  <style>
    body { font-family: Segoe UI, sans-serif; background: #0f1115; color: #e7eaf0; margin: 0; }
    .wrap { max-width: 760px; margin: 5rem auto; padding: 2rem; background: #171a21; border: 1px solid #2a2f3d; border-radius: 12px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    a.btn, button.btn { display: inline-block; background: #6ea8fe; color: #0c1320; font-weight: 600; text-decoration: none; padding: 10px 14px; border-radius: 8px; border: none; cursor: pointer; font: inherit; }
    a.ghost, button.ghost { background: transparent; color: #e7eaf0; border: 1px solid #2a2f3d; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>BCT Check-in Planner</h1>
    <p>The planner is now protected by Django authentication and server-side data APIs.</p>
    <div class="actions">
      <a class="btn" href="{% url 'planner:app' %}">Open Planner</a>
      <a class="btn ghost" href="{% url 'account-invitations' %}">Invite a colleague</a>
      <form method="post" action="{% url 'logout' %}" style="display:inline">
        {% csrf_token %}
        <button type="submit" class="btn ghost">Log out</button>
      </form>
    </div>
  </main>
</body>
</html>
