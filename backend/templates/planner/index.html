<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home · BCT Check-in Planner</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --border: #2a2f3d;
      --text: #e7eaf0;
      --muted: #9aa3b2;
      --accent: #6ea8fe;
    }
    body { font-family: Segoe UI, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    .page { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .card {
      padding: 2rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .card h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
    .card p { color: var(--muted); margin: 0 0 1.5rem; line-height: 1.5; }
    .shortcuts { display: flex; gap: 8px; flex-wrap: wrap; }
    a.btn {
      display: inline-block;
      background: var(--accent);
      color: #0c1320;
      font-weight: 600;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
    }
    a.ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  {% include "includes/app_shell_nav.html" %}
  <main class="page">
    <div class="card">
      <h1>BCT Check-in Planner</h1>
      <p>
        Plan biweekly 1:1 check-ins, manage teams, and configure onboarding for new hires.
        Use the navigation above to switch between tools.
      </p>
      <div class="shortcuts">
        <a class="btn" href="{% url 'planner:app' %}">Open planner</a>
        {% if planner_user_is_manager %}
        <a class="btn ghost" href="{% url 'onboarding:flows-editor' %}">Onboarding</a>
        {% endif %}
        <a class="btn ghost" href="{% url 'account-invitations' %}">Invite a colleague</a>
      </div>
    </div>
  </main>
</body>
</html>
